<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Details | FusionTek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 800px; width: 100%; }

        h1 { margin-bottom: 2rem; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .label { color: var(--text-dim); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .value { font-size: 1.125rem; margin-bottom: 1.5rem; line-height: 1.6; }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .feature-tag {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.875rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Dashboard</a>
        <h1>Feedback Analysis</h1>

        <div id="loading">Loading details...</div>

        <div id="details-content" style="display: none;">
            <div class="glass-panel">
                <div class="label">Original Content</div>
                <div class="value" id="content"></div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div>
                        <div class="label">Status</div>
                        <div class="value" id="status"></div>
                    </div>
                    <div>
                        <div class="label">Sentiment</div>
                        <div class="value" id="sentiment"></div>
                    </div>
                </div>

                <div class="label">Canonical Group</div>
                <div class="value" id="group"></div>
            </div>

            <div class="glass-panel">
                <div class="label">Actionable Insight</div>
                <div class="value" id="insight"></div>

                <div class="label">Detected Feature Requests</div>
                <div id="features" class="value"></div>
            </div>

            <div class="glass-panel">
                <div class="label">Raw AI Response</div>
                <pre id="raw" style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; font-size: 0.875rem;"></pre>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        async function loadDetails() {
            if (!id) return;
            try {
                const res = await fetch(\`/feedback/\${id}\`);
                if (!res.ok) throw new Error('Not found');
                const item = await res.json();

                document.getElementById('content').textContent = item.content;
                document.getElementById('status').textContent = item.status;
                
                const analysis = item.analysis_json;
                if (analysis) {
                    document.getElementById('sentiment').textContent = analysis.sentiment;
                    document.getElementById('group').textContent = item.group_label || analysis.canonical_group_label;
                    document.getElementById('insight').textContent = analysis.actionable_insight;
                    
                    const featuresDiv = document.getElementById('features');
                    featuresDiv.innerHTML = '';
                    analysis.feature_requests.forEach(f => {
                        const span = document.createElement('span');
                        span.className = 'feature-tag';
                        span.textContent = \`\${f.title} (conf: \${Math.round(f.confidence * 100)}%)\`;
                        featuresDiv.appendChild(span);
                    });
                } else {
                    document.getElementById('sentiment').textContent = 'Pending...';
                    document.getElementById('group').textContent = 'Pending...';
                    document.getElementById('insight').textContent = 'Pending...';
                    document.getElementById('features').textContent = 'None yet.';
                }

                document.getElementById('raw').textContent = item.raw_ai_response || 'No response yet.';

                document.getElementById('loading').style.display = 'none';
                document.getElementById('details-content').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').textContent = 'Error loading feedback: ' + e.message;
            }
        }

        window.onload = loadDetails;
    </script>
</body>
</html>
