<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Analysis Dashboard</title>
    <meta name="description" content="View and submit feedback for real-time analysis and sentiment grouping.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Area 1: Feedback Form */
        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            color: var(--text);
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Area 2: Feedback Table */
        .table-container {
            overflow-x: auto;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9375rem;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-processed { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }

        .sentiment-tag { color: var(--primary); font-style: italic; }

        .btn-details {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            font-size: 0.875rem;
        }

        .btn-details:hover {
            background: var(--primary);
            color: white;
        }

        /* Loading & Utility */
        .loading-spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            z-index: 100;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .ws-status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .dot { height: 8px; width: 8px; border-radius: 50%; background: var(--error); }
        .dot.connected { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.75rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="ws-status" id="wsStatus">
        <span class="dot" id="wsDot"></span>
        <span id="wsText">Connecting...</span>
    </div>

    <div class="container">
        <header>
            <h1>FusionTek Feedback</h1>
            <p class="subtitle">AI-powered analytics for your customer insights</p>
        </header>

        <section class="card">
            <div class="form-group">
                <label for="feedbackText">New Feedback</label>
                <textarea id="feedbackText" placeholder="Describe the issue or feature request..."></textarea>
            </div>
            <button id="btnSubmit" disabled>
                <span>Submit Feedback</span>
                <div class="loading-spinner" id="submitSpinner"></div>
            </button>
        </section>

        <section class="table-container">
            <table id="feedbackTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Text</th>
                        <th>Status</th>
                        <th>Sentiment</th>
                        <th>Group</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="feedbackBody">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">No feedback items yet. Submit one to get started!</div>
        </section>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        const API_BASE = 'http://localhost:3000';
        const WS_URL = 'ws://localhost:3000/ws';

        const dom = {
            textarea: document.getElementById('feedbackText'),
            btnSubmit: document.getElementById('btnSubmit'),
            spinner: document.getElementById('submitSpinner'),
            tableBody: document.getElementById('feedbackBody'),
            emptyState: document.getElementById('emptyState'),
            notification: document.getElementById('notification'),
            wsDot: document.getElementById('wsDot'),
            wsText: document.getElementById('wsText')
        };

        // --- Utility ---
        function showNotification(msg, duration = 3000) {
            dom.notification.textContent = msg;
            dom.notification.style.display = 'block';
            setTimeout(() => { dom.notification.style.display = 'none'; }, duration);
        }

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString();
        }

        // --- Table Management ---
        function renderRow(item) {
            const tr = document.createElement('tr');
            tr.id = `row-${item.id}`;
            
            const statusClass = `status-${(item.status || 'pending').toLowerCase()}`;
            
            tr.innerHTML = `
                <td>${item.id}</td>
                <td><div style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${escapeHTML(item.text)}">${escapeHTML(item.text)}</div></td>
                <td><span class="status-badge ${statusClass}">${escapeHTML(item.status || 'pending')}</span></td>
                <td class="sentiment-tag">${escapeHTML(item.sentiment || '-')}</td>
                <td>${escapeHTML(item.group || '-')}</td>
                <td>${formatDate(item.created_at)}</td>
                <td>${formatDate(item.updated_at)}</td>
                <td>
                    <button class="btn-details" onclick="location.href='feedback.html?id=${item.id}'">Details</button>
                </td>
            `;
            return tr;
        }

        function updateTableVisibility() {
            dom.emptyState.style.display = dom.tableBody.children.length === 0 ? 'block' : 'none';
        }

        // --- API Calls ---
        async function fetchFeedbacks() {
            try {
                const res = await fetch(`${API_BASE}/feedbacks`);
                if (!res.ok) throw new Error('Failed to fetch feedbacks');
                const data = await res.json();
                
                dom.tableBody.innerHTML = '';
                data.forEach(item => {
                    dom.tableBody.appendChild(renderRow(item));
                });
                updateTableVisibility();
            } catch (err) {
                console.error(err);
                showNotification('Error loading existing feedbacks');
            }
        }

        async function submitFeedback() {
            const text = dom.textarea.value.trim();
            if (!text) return;

            dom.btnSubmit.disabled = true;
            dom.spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error || 'Failed to submit feedback');
                }
                
                const responseData = await res.json();
                
                // Clear input
                dom.textarea.value = '';
                dom.btnSubmit.disabled = true;

                // Add to table
                const newRow = renderRow(responseData);
                // Prepend to top as it is new
                dom.tableBody.insertBefore(newRow, dom.tableBody.firstChild);
                updateTableVisibility();
                
                showNotification('Feedback submitted successfully');
            } catch (err) {
                console.error(err);
                alert(`Error: ${err.message}`);
                dom.btnSubmit.disabled = false;
            } finally {
                dom.spinner.style.display = 'none';
            }
        }

        // --- WebSocket ---
        let ws;
        function connectWebSocket() {
            console.log('Connecting to WebSocket...');
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('WebSocket Connected');
                dom.wsDot.classList.add('connected');
                dom.wsText.textContent = 'Live Updates Active';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('WS Message:', data);
                    
                    const row = document.getElementById(`row-${data.id}`);
                    if (row) {
                        // Update status
                        const statusBadge = row.querySelector('.status-badge');
                        statusBadge.className = `status-badge status-${data.status.toLowerCase()}`;
                        statusBadge.textContent = data.status;
                        
                        // Update sentiment (cell 3)
                        row.cells[3].textContent = data.sentiment || '-';
                        
                        // Update group (cell 4)
                        row.cells[4].textContent = data.group || '-';
                        
                        // Flash background to indicate update
                        row.style.transition = 'background 0.5s';
                        row.style.background = 'rgba(99, 102, 241, 0.2)';
                        setTimeout(() => row.style.background = '', 1000);
                    }
                } catch (e) {
                    console.error('Error parsing WS message', e);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket Disconnected');
                dom.wsDot.classList.remove('connected');
                dom.wsText.textContent = 'Disconnected. Reconnecting...';
                // Try to reconnect after 5 seconds
                setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket Error', err);
                ws.close();
            };
        }

        // --- Event Listeners ---
        dom.textarea.addEventListener('input', () => {
            dom.btnSubmit.disabled = dom.textarea.value.trim().length === 0;
        });

        dom.btnSubmit.addEventListener('click', submitFeedback);

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            fetchFeedbacks();
            connectWebSocket();
        });
    </script>
</body>
</html>
