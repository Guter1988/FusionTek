<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionTek | Feedback Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 { font-weight: 600; font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            color: white;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); color: var(--text-dim); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); }

        .status { padding: 0.25rem 0.6rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .status-received { background: #64748b; }
        .status-analyzing { background: #f59e0b; }
        .status-done { background: #10b981; }
        .status-failed { background: #ef4444; }

        .details-link { color: var(--primary); text-decoration: none; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FusionTek</h1>
            <p style="color: var(--text-dim)">Multilingual AI Feedback Analysis System</p>
        </header>

        <section class="glass-panel">
            <textarea id="feedback-input" rows="4" placeholder="Enter user feedback here (any language supported)..."></textarea>
            <button id="submit-btn">Submit Feedback</button>
        </section>

        <section class="glass-panel">
            <h2>Live Feed</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Content</th>
                        <th>Status</th>
                        <th>Sentiment</th>
                        <th>Group</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="feedback-table-body">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </section>
    </div>

    <script>
        const tableBody = document.getElementById('feedback-table-body');
        const input = document.getElementById('feedback-input');
        const submitBtn = document.getElementById('submit-btn');

        async function fetchFeedbacks() {
            const res = await fetch('/feedbacks');
            const data = await res.json();
            renderTable(data);
        }

        function renderRow(item) {
            const tr = document.createElement('tr');
            tr.id = `row-${item.id}`;
            
            const sentiment = item.analysis_json?.sentiment || '...';
            const group = item.group_label || '...';

            tr.innerHTML = `
                <td>${item.id}</td>
                <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" id="content-${item.id}"></td>
                <td><span class="status status-${item.status.toLowerCase()}" id="status-${item.id}">${item.status}</span></td>
                <td id="sentiment-${item.id}">${sentiment}</td>
                <td id="group-${item.id}">${group}</td>
                <td><a href="feedback.html?id=${item.id}" class="details-link">Details</a></td>
            `;
            // Use textContent for safety
            tr.querySelector(`#content-${item.id}`).textContent = item.content;
            return tr;
        }

        function renderTable(data) {
            tableBody.innerHTML = '';
            data.forEach(item => tableBody.appendChild(renderRow(item)));
        }

        submitBtn.onclick = async () => {
            const content = input.value.trim();
            if (!content) return;

            submitBtn.disabled = true;
            try {
                const res = await fetch('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                if (res.ok) {
                    input.value = '';
                    fetchFeedbacks();
                }
            } finally {
                submitBtn.disabled = false;
            }
        };

        // Websocket
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(\`\${protocol}//\${window.location.host}/ws\`);

        ws.onmessage = (event) => {
            const update = JSON.parse(event.data);
            const row = document.getElementById(\`row-\${update.id}\`);
            if (row) {
                const statusSpan = row.querySelector(\`#status-\${update.id}\`);
                statusSpan.textContent = update.status;
                statusSpan.className = \`status status-\${update.status.toLowerCase()}\`;
                
                row.querySelector(\`#sentiment-\${update.id}\`).textContent = update.sentiment;
                row.querySelector(\`#group-\${update.id}\`).textContent = update.group;
            } else {
                fetchFeedbacks();
            }
        };

        window.onload = fetchFeedbacks;
    </script>
</body>
</html>
