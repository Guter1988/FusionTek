<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Details | FusionTek</title>
    <meta name="description" content="View detailed feature analysis and precision scores for feedback item.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-blur: blur(12px);
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 100% 100%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(225,39%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--text); }

        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td { padding: 1rem; border-bottom: 1px solid var(--border); }

        .precision-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        .precision-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            text-align: center;
            margin-top: 2rem;
        }

        .loading-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .loading-state span { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="feedbackTitle">Feedback Details</h1>
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </header>

        <main id="mainContent">
            <div class="loading-state"><span>Analyzing feedback details...</span></div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        async function fetchDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const mainContent = document.getElementById('mainContent');
            const feedbackTitle = document.getElementById('feedbackTitle');

            if (!id) {
                renderError('Missing Feedback ID. Please return to the dashboard.');
                return;
            }

            feedbackTitle.textContent = `Feedback #${id}`;

            try {
                const res = await fetch(`${API_BASE}/feedback/${id}`);
                if (!res.ok) throw new Error('Could not fetch details for this feedback item.');
                
                const details = await res.json();
                renderDetails(details);
            } catch (err) {
                renderError(err.message);
            }
        }

        function renderDetails(details) {
            const mainContent = document.getElementById('mainContent');
            
            if (!details || details.length === 0) {
                mainContent.innerHTML = `
                    <div class="card">
                        <p class="section-title">No analysis features found for this item.</p>
                    </div>
                `;
                return;
            }

            let tableRows = details.map(item => {
                const percentage = (item.precision * 100).toFixed(1);
                return `
                    <tr>
                        <td style="font-weight: 500;">${escapeHTML(item.feature)}</td>
                        <td>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                <span>${percentage}%</span>
                            </div>
                            <div class="precision-bar-container">
                                <div class="precision-bar" style="width: ${percentage}%"></div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            mainContent.innerHTML = `
                <div class="card">
                    <p class="section-title">Feature Breakdown & Precision</p>
                    <table>
                        <thead>
                            <tr>
                                <th>Feature</th>
                                <th>Precision score</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderError(msg) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="error-message">
                    <p><strong>Error:</strong> ${msg}</p>
                </div>
            `;
        }

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', fetchDetails);
    </script>
</body>
</html>
